<!DOCTYPE html>
<html lang="it">
<head>
  <title>Biorep - Utente</title>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://ajax.aspnetcdn.com/ajax/bootstrap/3.3.5/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rubik:300,400,500,600" />

  <style id="common">
    @font-face {
      font-family: "SegoeUI";
      src: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/fonts/segoeui.WOFF);
      font-weight: normal;
    }

    @font-face {
      font-family: "SegoeUI";
      src: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/fonts/segoeui_bold.WOFF);
      font-weight: bold;
    }

    #AmazonExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/amazon.svg); }
    #AmazonExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/amazon.svg); }
    #FacebookExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/facebook.svg); }
    #FacebookExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/facebook.svg); }
    #GitHubExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/github.svg); }
    #GitHubExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/github.svg); }
    #AppleExchange, #AppleManagedExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/apple.svg); }
    #AppleExchange:hover, #AppleManagedExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/apple.svg); }
    #GoogleExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/google.svg); }
    #GoogleExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/google.svg); }
    #LinkedInExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/linkedin.svg); }
    #LinkedInExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/linkedin.svg); }
    #MicrosoftAccountExchange { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/colored/microsoft.svg); }
    #MicrosoftAccountExchange:hover { background-image: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/idp_logos/white/microsoft.svg); }

    .buttons #cancel:before {
      content: url(https://biorepportaletestb2c.b2clogin.com/static/tenant/templates/images/left-arrow.svg);
    }
  </style>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body, .panel, .panel_layout, .panel_layout_row {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #1a4080;
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      text-align: left;
    }

    /* ── Background image ── */
    img[data-tenant-branding-background="true"] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    div[data-tenant-branding-background-color="true"] {
      width: 100%;
      height: 100%;
      position: fixed;
      z-index: 0;
    }

      div[data-tenant-branding-background-color="true"]::after {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.05);
        z-index: 1;
      }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 2;
      display: table;
      width: 100%;
      height: 100vh;
      padding: 0;
      text-align: center;
    }

    .row {
      display: table-cell;
      vertical-align: middle;
      width: 100%;
      margin: 0;
    }

    .col-lg-6 {
      max-width: 460px;
      width: 100%;
      float: none;
      display: inline-block;
      vertical-align: top;
      padding: 0;
    }

    .unified_container .row .panel-default,
    .self_asserted_container .row .panel-default {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      padding: 44px 40px 36px;
      margin: 24px auto;
      height: auto;
    }

      .unified_container .row .panel-default .panel-body,
      .self_asserted_container .row .panel-default .panel-body {
        max-width: 360px;
        width: 100%;
        margin: 0 auto;
        padding: 0;
      }

        .unified_container .row .panel-default .panel-body .companyLogo,
        .self_asserted_container .row .panel-default .panel-body .companyLogo {
          display: block;
          margin: 0 auto 28px;
          height: 100px;
          width: auto;
        }

        /* Nascondi titoli superflui nativi di B2C */
        .unified_container .row .panel-default .panel-body h3,
        .unified_container .row .panel-default .panel-body .companyName,
        .self_asserted_container .row .panel-default .panel-body .branding h1,
        .self_asserted_container .row .panel-default .panel-body h3,
        .self_asserted_container .row .panel-default .panel-body .intro {
          display: none;
        }

    /* ── API container ── */
    #api {
      display: block;
      width: 100%;
      margin: 0;
    }

    /* ── Errori e Messaggi ── */
    #api .error,
    #api .pageLevel,
    #api .errorText,
    #attributeVerification .error,
    #attributeVerification .pageLevel {
      color: #ff4a4a !important;
      text-align: left;
      font-size: 13px;
      margin-bottom: 8px;
      background: transparent;
      border: none;
      padding: 0;
    }

    #api .helpText {
      display: none;
    }

    /* Testo di info (es. codice inviato) */
    #api .verificationInfoText,
    #attributeVerification #attributeList ul li #email_success.verificationSuccessText,
    #attributeVerification #attributeList ul li #email_info,
    div#email_intro {
      color: #ffffff;
      text-align: left;
      font-size: 13px;
      margin-bottom: 8px;
      float: none !important;
      display: block;
      width: 100%;
    }

    /* ── Liste Attributi (Campi di Input) ── */
    #attributeList ul {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

      #attributeList ul li {
        list-style: none;
        margin: 10px 0;
      }

        #attributeList ul li label {
          display: none; 
        }

        #attributeList ul li input {
          outline: 0;
          width: 100% !important;
          height: 48px;
          background: rgba(255, 255, 255, 0.40) !important;
          background-image: none !important;
          border: 1px solid rgba(255, 255, 255, 0.60) !important;
          border-radius: 10px !important;
          color: #1a4080 !important;
          font-family: 'Rubik', sans-serif;
          font-size: 14px;
          padding: 0 18px;
          transition: border-color 0.2s, background 0.2s;
          text-indent: 0; /* Override vecchio stile */
        }

          #attributeList ul li input::placeholder,
          #attributeList ul li input::-webkit-input-placeholder {
            color: rgba(26, 64, 128, 0.70);
            text-indent: 0;
          }

          #attributeList ul li input:focus {
            border: 1.5px solid #1a4080 !important;
            background: rgba(255, 255, 255, 0.60) !important;
          }

          #attributeList ul li .attrEntry.validate input.invalid,
          #attributeList ul li .attrEntry.validate input:invalid {
            border: 1px solid #ff4a4a !important;
            outline: unset;
          }

    /* ── Pulsanti di Verifica (Invia codice, Verifica, Cambia email) ── */
    #attributeList ul li .attrEntry .verify,
    #attributeList ul li .attrEntry .verificationControlContent .buttons {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    #attributeList ul li .attrEntry .verify button,
    #attributeList ul li .attrEntry .verificationControlContent button {
      background-color: #296ec6;
      color: #ffffff;
      border: 1px solid rgba(41,110,198,0.4);
      border-radius: 10px;
      height: 46px;
      font-family: 'Rubik', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      flex: 1; /* Fa in modo che i pulsanti si adattino */
      min-width: 120px;
      padding: 0 15px;
    }

    #attributeList ul li .attrEntry .verify button:hover,
    #attributeList ul li .attrEntry .verificationControlContent button:hover {
      background-color: #1662c7;
    }

    /* Pulsante Riprova/Nuovo codice */
    #attributeList ul li .attrEntry .verify .sendButton[id$="ver_but_resend"],
    #attributeList ul li .attrEntry .verificationControlContent .sendNewCode {
      bottom: auto;
      right: auto;
      position: relative;
    }

    /* Override specifiche inline di B2C per i bottoni email */
    #attributeVerification #attributeList ul li #email_ver_but_verify,
    #attributeVerification #attributeList ul li .attrEntry .verify #email_ver_but_send {
      width: 100% !important;
      float: none !important;
      position: relative !important;
      top: 0 !important;
      height: 46px !important;
      text-indent: 0 !important; 
      overflow: visible !important;
    }

    #attributeVerification #attributeList ul li .attrEntry .verify #email_ver_but_send:after {
      content: none !important;
    }

    #attributeVerification #attributeList ul li .attrEntry .verify #email_ver_but_edit {
      margin: 10px 0 0 0 !important;
      width: 100% !important;
      float: none !important;
      box-shadow: none !important;
    }

    /* ── Pulsanti Principali (Continua, Annulla) ── */
    .buttons {
      margin-top: 30px;
      position: relative;
    }

    .buttons button:not(#cancel) {
      width: 100%;
      height: 48px;
      background: #296ec6;
      border: 1px solid rgba(41,110,198,0.5);
      border-radius: 10px;
      color: #ffffff !important;
      font-family: 'Rubik', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin: 0;
      padding: 0;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(41,110,198,0.30);
    }

      .buttons button:not(#cancel):hover {
        background: #1662c7;
        box-shadow: 0 6px 22px rgba(41,110,198,0.45);
      }

      .buttons button[aria-disabled="true"] {
        opacity: 0.4;
      }

    /* ── Back button (Annulla) ── */
    .buttons #cancel {
      background: transparent;
      border: 0;
      color: #ffffff;
      font-size: 14px;
      padding: 0;
      cursor: pointer;
      position: absolute;
      top: -65px; 
      left: 0;
      box-shadow: none;
      text-align: left;
      width: auto !important;
    }

      .buttons #cancel:hover {
        color: #e0e0e0 !important;
      }

      .buttons #cancel:before {
        padding: 0 10px 0 0;
        vertical-align: middle;
        zoom: 90%;
        display: inline-block;
      }

    /* ── Loader ── */

      background: url(data:image/gif;base64,R0lGODlhbgAKAPMAALy6vNze3PTy9MTCxOTm5Pz6/Ly+vNTS1Pz+/Ozq7MzKzP///wAAAAAAAAAAAAAAACH/C05FVFNDQVBFMi4wAwEAAAAh+QQJCQAJACwTAAIABgAGAAAEE7AcM0iaIAuaQRidR4RIIgREGQEAIfkECQkACQAsJwACAAYABgAABBOwHDNImiALmkEYnUeESCIERBkBACH5BAkJAAkALDYAAgAGAAYAAAQTsBwzSJogC5pBGJ1HhEgiBEQZAQAh+QQJCQAJACxFAAIABgAGAAAEE7AcM0iaIAuaQRidR4RIIgREGQEAIfkECQkACgAsCwACAEAABgAABDdQpWFOUTjrzbv/HkFZAmACB6iuLFeeR3CabW138izOd3/vJwTFRPAZWUIDUUIICI5QFSLgVEQAACH5BAkJAAoALB8AAgAtAAYAAAQyUKVhTlE46837LkdFSEAJHF6qcqEpBGa5zmp8Ejatc0ZfEgjKb0fE4FwSQkBQbL6AiggAIfkECQkACgAsOAACABUABgAABCpQpWFOUTjnciqRQAgcWtmJQiCGpbaOxNtmRh0SCHXPWIxKhICAtxEiFBEAIfkECQkACgAsPQACABAABgAABCdQpWFOURgTagX4wJFJBngE4Dei6ZauqYFQHzHOZSgRgTBiiEBPEQEAIfkECQkACwAsAwACAEsABgAABEVwpWFOWTjrzbv/XnFUxCaSEqACB+i+cDeugjarQrCqce97O5bGsAsQgr9kkkgbFhEUnHIaOzYzVimCYKR6XzkCghMeRwAAIfkECQkACwAsJgACACkABgAABDxwpWFOWTjrrcupxOaBEmACB6dy3ylorSkEp7neWI1qRh0QOtyt5+L5EBSZcAUsZppKBOG3vM0ICM41GwEAIfkECQkACgAsMAACAB8ABgAABDdQpWFOUThrQq2WXSEAJHB8m1Ge2bgGJYlmcJzGnD2DOpaXCAqJsOMNNUGVSUIICIoYRMCJklIjACH5BAkJAAsALDUAAgAbAAYAAAQ3cKVhTlkYl1NJ1tyQSEAJHN8SlsK3AkJglul8fsYcEHadszgdggJ0/URG0wVB2KVABMQzFpBGAAAh+QQJCQALACwPAAIAQgAGAAAEU3ClYU5ZOOvNOyeUtRVHRYzlkEhACxxeLH+GC2tpK+AuIAQ9w2woA/Y2wYCmZgMdidCN04Vk+pY9AoKii3oxW+aJ50KQuwhCYPf9ptedn/YTgEcAACH5BAkJAAsALB4AAgAzAAYAAARMcKVhTlk4663LqQQ3VZdGUJYArMDBvdzHCp3Bupl6B+wK/5heyyQk9k494M82M7KcKwRlFVK+kNFaMzcdIggBmhUmCCNEYHEnEF5EAAAh+QQJCQALACwoAAIAKgAGAAAER3ClYU5ZOGtCrZZHRXxFOCQgoB7fZqgA68LCrAoBrLZZrn+6mOYFC3B+PEkQSBRmmjEE5ZZMUW0n7AVBMFYxXG8LR0CMjeYIACH5BAkJAAsALC4AAgApAAYAAARHsBwzyLo4DVrwlZTljRo3AajgCRR6jGc6Zi0Qu16A7uOOzwudb7MTXQjDns9IGiJ3iBXR1oQCFyCZIECIkriq2bZ7/RC4iwgAIfkECQkACwAsLgACADMABgAABExwpWFOWRiXU0nOU3V9ZAlSlgCswEFyrPCprGvemlEH7Er2rQ+vh8MNd8SPLiYEFm8EIIKy8jSZJ+yTNF16EISArCQQI8jh8RYtXkQAACH5BAkJAAsALC8AAgA/AAYAAAROsBwzyLo4DVrwlZTljWRpZtsErIInUOsxquxp3x+sA4EXrMARMIYrln5DoOhCSAqHS6O0yRoiXJsaFniVekGAhSBA6LrILdK47G2LCYEIACH5BAkJAAoALDAAAgAfAAYAAAQ6sBwziLo4DVqwz9shASQgeAJFHh+qAlMJe4EMtKAtW3mJ       height: 30px;
      width: auto;
      background-position: center bottom;
      margin-top: 15px;
      margin-bottom: 10px;
    }

    /* ── Misc ── */
    p { margin: 0; }
    ul { padding: 0; }
    a { color: #ffffff; text-decoration: underline; text-decoration-thickness: 1px; }
    a:hover { color: #ffffff; }
    input[type="email"], input[type="text"] { -webkit-appearance: none; }
    .working { display: none; }
    
    /* ── Responsive ── */
    @media only screen and (max-width: 600px) {
      img[data-tenant-branding-background="true"] { display: none; }
      .container { background: linear-gradient(135deg, #1a4080 0%, #296ec6 100%); }
      .unified_container .row .panel-default,
      .self_asserted_container .row .panel-default {
        border-radius: 0;
        border: none;
        box-shadow: none;
        margin: 0;
        min-height: 100vh;
        padding: 40px 24px;
        background: rgba(255, 255, 255, 0.20);
      }
      .buttons #cancel { top: 0px; left: 15px; } /* Riposiziona il tasto indietro su mobile */
    }

  </style>
</head>
<body>
  <div id="background_branding_container" data-tenant-branding-background-color="true">
    <img data-tenant-branding-background="true"
         src="https://portale-test.azurewebsites.net/assets/content/login/reservedarea-desktop.png"
         alt="Background Image" />
  </div>
  <div class="container self_asserted_container" role="presentation">
    <div class="row">
      <div class="col-lg-6">
        <div class="panel panel-default">
          <div class="panel-body">
            <img class="companyLogo"
                 data-tenant-branding-logo="true"
                 src="https://portale-test.azurewebsites.net/assets/content/login/biorep-logo-small.webp"
                 alt="Company Logo" />
            <div id="api" role="main"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
